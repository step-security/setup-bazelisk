name: Validate 'setup-bazelisk'
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  setup-versions:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJson('["ubuntu-latest"]') || fromJson('["ubuntu-latest", "windows-latest", "macos-14"]') }}
        bazelisk: ${{ github.actor == 'dependabot[bot]' && fromJson('["1"]') || fromJson('["1.7.4", "1.6", "1"]') }}
        bazel: ${{ github.actor == 'dependabot[bot]' && fromJson('["4.0.0"]') || fromJson('["4.0.0", "3.7.2", "3.5.0", "5.1.0"]') }}
        exclude:
          # bazelisk 1.7.4 and 1.6 predate Apple Silicon (darwin-arm64) support — added in 1.9+
          - os: macos-14
            bazelisk: "1.7.4"
          - os: macos-14
            bazelisk: "1.6"
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup-bazelisk ${{ matrix.bazelisk }}
        uses: ./
        with:
          bazelisk-version: ${{ matrix.bazelisk }}

      - name: verify bazelisk
        run: __tests__/verify-bazelisk.sh ${{ matrix.bazelisk }}
        shell: bash
        env:
          USE_BAZEL_VERSION: ${{ matrix.bazel }}
